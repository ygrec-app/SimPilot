excluded:
  - .build
  - Package.swift
  - Tests

opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

disabled_rules:
  - trailing_comma
  - opening_brace
  - todo
  - nesting
  - type_body_length
  - file_length
  - function_body_length

line_length:
  warning: 140
  error: 200

type_name:
  min_length: 2

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y
    - i

large_tuple:
  warning: 4

function_parameter_count:
  warning: 8
  error: 12

reporter: xcode
